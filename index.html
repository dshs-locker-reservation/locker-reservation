<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사물함 예약</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>야간자율학습 사물함 예약</h1>

<div class="info-box">
  <h2>📌 이용 안내 및 주의사항</h2>
  <ul>
    <li><strong>이용 방법</strong>&ensp;<span style="color: green;">빈 칸(초록색)</span>을 클릭해 예약하고, <span style="color:red">예약된 칸(빨간색)</span>을 클릭하면 취소할 수 있습니다.</li>
    <li><strong>필수 조건</strong>&ensp;일주일 <span class="highlight">12시간 이상 야간자율학습</span> 필수! (미달 시 사물함 이용 퇴출)</li>
    <li><strong>경고 조치</strong>&ensp;퇴출 시 <span class="highlight">3일 이내에 사물함을 비우지 않으면 내부 물품은 즉시 폐기</span> 처리됩니다.</li>
  </ul>
</div>

<div class="status-box">
  <div class="status-title">📊 현재 예약 현황</div>
  <div class="status-numbers">
    <div class="status-item status-available">
      <span>이용 가능</span>
      <b id="count-available">33</b>
    </div>
    <div class="status-item status-occupied">
      <span>사용 중</span>
      <b id="count-occupied">0</b>
    </div>
  </div>
</div>

<div id="grid"></div>

<div class="quote-box">
  <p id="quote-text"></p>
  <span class="quote-author" id="quote-author"></span>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title">타이틀</h3>
    <p id="modal-desc">설명</p>
    <input type="text" id="modal-input" placeholder="이름을 입력하세요" />
    <div class="modal-buttons">
      <button id="modal-cancel">취소</button>
      <button id="modal-confirm">확인</button>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
