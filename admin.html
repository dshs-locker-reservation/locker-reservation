<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>관리자 페이지</title>
</head>

<body>

<h1>예약 관리</h1>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, get, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

// 가져오신 Firebase 설정 적용 완료! (databaseURL 추가됨)
const firebaseConfig = {
  apiKey: "AIzaSyAk8MjKCLDbk-OXqxyW5g8MY7DLaY4Dbjg",
  authDomain: "locker-b8f43.firebaseapp.com",
  projectId: "locker-b8f43",
  storageBucket: "locker-b8f43.firebasestorage.app",
  messagingSenderId: "204210400652",
  appId: "1:204210400652:web:ffd978d8ceba7814e63aa9",
  measurementId: "G-GYHSV2FWNR",
  databaseURL: "https://locker-b8f43-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const list = document.getElementById("list");

async function load() {
  list.innerHTML = "데이터를 불러오는 중..."; 

  const lockersRef = ref(db, "lockers");
  const snapshot = await get(lockersRef);

  list.innerHTML = ""; 

  if (snapshot.exists()) {
    const lockersData = snapshot.val();
    let hasReservation = false;

    for (let i = 1; i <= 33; i++) {
      if (lockersData[i]) {
        hasReservation = true;
        
        let div = document.createElement("div");
        div.style.marginBottom = "10px"; 
        div.innerHTML = `<strong>${i}번</strong> : ${lockersData[i].name} `;

        let btn = document.createElement("button");
        btn.innerText = "삭제";

        btn.onclick = async () => {
          let specificLockerRef = ref(db, "lockers/" + i);
          await remove(specificLockerRef);
          load(); 
        };

        div.appendChild(btn);
        list.appendChild(div);
      }
    }

    if (!hasReservation) {
      list.innerHTML = "현재 예약된 사물함이 없습니다.";
    }

  } else {
    list.innerHTML = "현재 예약된 사물함이 없습니다.";
  }
}

load();
</script>

</body>
</html>
